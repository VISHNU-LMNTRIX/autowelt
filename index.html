<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        AUTOWELT | Premium Car Detailing in Kochi, Kerala
    </title>

    <meta
        name="description"
        content="Luxury car detailing studio in Kochi, Kerala specializing in ceramic coating, paint correction, PPF and premium automotive care."
    >

    <!-- OUTPUT CSS -->

    <link
        rel="stylesheet"
        href="dist/output.css"
    >

    <!-- GLOBAL CSS -->

    <link
        rel="stylesheet"
        href="css/globals.css"
    >

    <!-- COMPONENT CSS -->

    <link
        rel="stylesheet"
        href="css/components/navbar.css"
    >

    <link 
        rel="stylesheet" 
        href="css/components/services-section.css"
    >    

    <link
        rel="stylesheet" 
        href="css/components/standards-section.css"
    >

    <link
        rel="stylesheet"
        href="css/components/footer.css"
    >

    <link 
        rel="stylesheet" 
        href="css/components/brands-section.css"
    >

    <link
        rel="stylesheet"
        href="css/components/blog-preview-section.css"
    />

    <!-- PAGE CSS -->

    <link
        rel="stylesheet"
        href="css/desktop.css"
    >

    <link
        rel="stylesheet"
        href="css/mobile.css"
    >

    <link
        rel="stylesheet"
        href="css/animations.css"
    >

</head>

<body>


    <!-- NAVBAR -->

    <div id="navbar-container"></div>


    <!-- MAIN -->

    <main>


        <!-- HERO SECTION -->

        <section class="hero-section">


            <!-- BACKGROUND IMAGE -->

            <div class="hero-background">

                <img
                    src="assets/images/hero-car.jpg"
                    alt="Luxury Car Detailing"
                    class="hero-bg-image"
                >

            </div>


            <!-- OVERLAYS -->

            <div class="hero-overlay"></div>

            <div class="hero-overlay-bottom"></div>


            <!-- CONTENT -->

            <div class="container hero-content-wrapper">

                <div class="hero-content">

                    <!-- TOP LABEL -->

                    <div class="hero-topline reveal">

                        <div class="hero-line"></div>

                        <span>

                            Kerala's Premium Detailing Studio

                        </span>

                    </div>


                    <!-- HEADLINE -->

                    <h1 class="hero-title text-reveal">

                        <div class="hero-line-wrap">
                            <span class="delay-1">
                                PRECISION IN
                            </span>
                        </div>

                        <div class="hero-line-wrap">
                            <span class="delay-2">
                                EVERY
                            </span>
                        </div>

                        <div class="hero-line-wrap">
                            <span class="hero-strike delay-3">
                                REFLECTION
                            </span>
                        </div>

                        <div class="hero-line-wrap">
                            <span class="delay-4">
                                PERFECTION.
                            </span>
                        </div>

                    </h1>


                    <!-- DESCRIPTION -->

                    <p class="hero-description reveal delay-2">

                        We don't just wash cars; we restore and protect
                        automotive masterpieces using advanced nanotechnology
                        and obsessive attention to detail.

                    </p>


                    <!-- ACTIONS -->

                    <div class="hero-actions reveal delay-3">

                        <a
                            href="contact.html"
                            class="btn-primary"
                        >

                            Book Appointment

                        </a>

                        <a
                            href="contact.html"
                            class="btn-secondary"
                        >

                            Get Quote

                        </a>

                    </div>

                </div>

            </div>

        </section>

        <div id="services-section-container"></div>

        <div id="standards-section-container"></div>

        <div id="brands-section-container"></div>

        <div id="blog-preview-section-container"></div>


    </main>


    <!-- FOOTER -->

    <div id="footer-container"></div>


    <!-- JS -->

    <script src="js/animations.js"></script>

    <script src="js/main.js"></script>

    <script src="js/navbar.js"></script>

</body>

</html>
